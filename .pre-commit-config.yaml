exclude: "node_modules|.git"
default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        files: "careverse_regulator.*"
        exclude: ".*json$|.*txt$|.*csv|.*md|.*svg"
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        name: "Run ruff import sorter"
        args: ["--select=I", "--fix"]

      - id: ruff
        name: "Run ruff linter"

      - id: ruff-format
        name: "Run ruff formatter"

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, vue, scss, css, json, yaml, markdown]
        # Ignore any files that might contain jinja / bundles
        exclude: |
          (?x)^(
              careverse_regulator/public/dist/.*|
              frontend/dist/.*|
              frontend/node_modules/.*|
              .*node_modules.*|
              .*boilerplate.*|
              careverse_regulator/templates/includes/.*|
              careverse_regulator/public/js/lib/.*|
              frontend/src/routeTree.gen.ts
          )$

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.44.0
    hooks:
      - id: eslint
        types_or: [javascript, jsx, ts, tsx]
        args: ["--quiet"]
        # Ignore any files that might contain jinja / bundles
        exclude: |
          (?x)^(
              careverse_regulator/public/dist/.*|
              frontend/dist/.*|
              frontend/node_modules/.*|
              cypress/.*|
              .*node_modules.*|
              .*boilerplate.*|
              careverse_regulator/templates/includes/.*|
              careverse_regulator/public/js/lib/.*|
              frontend/src/routeTree.gen.ts
          )$

ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
